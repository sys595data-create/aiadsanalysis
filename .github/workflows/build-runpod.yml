name: Build & Push RunPod Worker Image

on:
  push:
    branches: [main]
    paths:
      - "runpod_worker/**"
      - "backend/ingestion/**"
      - "backend/pipeline/**"
      - "backend/voc/**"
      - "backend/export/**"
      - "backend/ingestion/base.py"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: runpod_worker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aiadsanalysis-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
