name: Build & Push RunPod Worker Image

on:
  push:
    branches: [main]
    paths:
      - "runpod_worker/**"
      - "backend/ingestion/**"
      - "backend/pipeline/**"
      - "backend/voc/**"
      - "backend/export/**"
      - "backend/ingestion/base.py"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: runpod_worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aiadsanalysis-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
